<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PQQ Đạo Lý - Vũ Trụ</title>
    <!-- Font Awesome cho Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts cho nét chữ thanh thoát -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Dải màu vũ trụ: Xanh lam đậm, Tím, Xanh ngọc */
            --primary-gradient: linear-gradient(135deg, #1a237e, #4a148c, #006064);
            --bg-color: #050711; /* Màu nền đen sâu */
            --card-bg: rgba(255, 255, 255, 0.1); /* Kính mờ trắng tinh tế */
            --text-color: #ecf0f1; /* Trắng xám dễ đọc */
            --hover-transform: translateY(-10px);
        }

        body {
            font-family: 'Quicksand', sans-serif;
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Cài đặt hình nền vũ trụ bao la */
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.7)), /* Lớp phủ mờ tối để dễ đọc chữ */
                url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=1920&auto=format&fit=crop'); /* Hình nền dải ngân hà */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* Header phong cách kính mờ vũ trụ */
        header {
            background: rgba(10, 10, 20, 0.5); /* Nền mờ xanh đen */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: white;
            width: 100%;
            padding: 3rem 0;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 40px rgba(0, 0, 0, 0.3);
        }

        header h1 {
            margin: 0;
            font-size: 3rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 700;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
        }

        /* Bố cục chứa các thẻ */
        .container {
            max-width: 1200px;
            width: 90%;
            margin: 5rem auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 3rem;
            flex-grow: 1;
        }

        /* Thẻ nội dung vũ trụ */
        .category-card {
            background-color: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 3.5rem 2.5rem;
            text-align: center;
            text-decoration: none;
            color: var(--text-color);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.2); /* Viền mờ */
            position: relative;
            overflow: hidden;
        }

        .category-card:hover {
            transform: var(--hover-transform);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(142, 68, 173, 0.5); /* Viền phát sáng tím khi hover */
        }

        /* Khối bao quanh icon để làm nổi bật (dùng gradient vũ trụ) */
        .icon-wrapper {
            width: 100px;
            height: 100px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            box-shadow: 0 10px 25px rgba(142, 68, 173, 0.4);
            transition: transform 0.4s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .category-card:hover .icon-wrapper {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 15px 35px rgba(0, 192, 192, 0.6); /* Đổi màu phát sáng xanh ngọc khi hover */
        }

        .category-card i {
            font-size: 3rem;
            color: white;
            margin: 0;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
        }

        .category-card h2 {
            font-size: 1.6rem;
            margin: 0;
            line-height: 1.5;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
        }

        /* Chân trang vũ trụ */
        footer {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 2rem 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Hiệu ứng Responsive cho điện thoại */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2.5rem;
                letter-spacing: 3px;
            }
            .container {
                gap: 2rem;
                margin: 4rem auto;
            }
            .category-card {
                padding: 2.5rem 1.5rem;
            }
        }
    </style>
</head>
